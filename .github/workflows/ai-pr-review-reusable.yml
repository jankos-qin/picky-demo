name: Picky (Reusable)

on:
  workflow_call:
    inputs:
      provider:
        description: AI provider to use for review generation.
        required: false
        type: string
        default: deepseek
      model:
        description: Model name to use for the review.
        required: false
        type: string
      base_url:
        description: Optional provider base URL override.
        required: false
        type: string
      config_path:
        description: Path to the repo review config.
        required: false
        type: string
        default: .ai-code-review.yml
      max_files:
        description: Maximum number of changed files to review in one run.
        required: false
        type: number
        default: 25
      max_patch_chars:
        description: Maximum patch characters to send to the model.
        required: false
        type: number
        default: 120000
      post_summary:
        description: Whether to post a PR summary in addition to inline comments.
        required: false
        type: boolean
        default: true
      min_severity_to_publish:
        description: Minimum severity required before publishing a finding.
        required: false
        type: string
        default: low
    secrets:
      api_key:
        description: API key for the selected LLM provider.
        required: false
      DEEPSEEK_API_KEY:
        description: DeepSeek API key.
        required: false
      BCP_API_KEY:
        description: BCP API key.
        required: false
      OPENAI_API_KEY:
        description: OpenAI API key.
        required: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and run Picky
        shell: bash
        run: |
          set -euo pipefail

          # Discover the picky source repo by parsing the caller's workflow.
          # The caller's repo is already checked out and must contain a
          #   uses: owner/repo/.github/workflows/ai-pr-review-reusable.yml@ref
          # line — we extract owner/repo and ref from it.
          USES_LINE=$(grep -rh "ai-pr-review-reusable\.yml@" .github/workflows/ 2>/dev/null | grep -v "^[[:space:]]*#" | head -1 || true)

          if [ -z "$USES_LINE" ]; then
            echo "::error::Could not find a reference to ai-pr-review-reusable.yml in .github/workflows/"
            exit 1
          fi

          PICKY_REPO=$(echo "$USES_LINE" | sed -n 's|.*uses:[[:space:]]*\([^/]*/[^/]*\)/.github/workflows/ai-pr-review-reusable\.yml@.*|\1|p')
          PICKY_REF=$(echo "$USES_LINE" | sed -n 's|.*ai-pr-review-reusable\.yml@\([^[:space:]"'"'"']*\).*|\1|p')

          if [ -z "$PICKY_REPO" ] || [ -z "$PICKY_REF" ]; then
            echo "::error::Could not parse repo/ref from: ${USES_LINE}"
            exit 1
          fi

          # Download picky source (public repo, no auth needed)
          PICKY_DIR=$(mktemp -d)
          curl -fsSL \
            "https://github.com/${PICKY_REPO}/archive/${PICKY_REF}.tar.gz" | \
            tar xz --strip-components=1 -C "$PICKY_DIR"

          ACTION_DIR="$PICKY_DIR/.github/actions/ai-pr-review"

          # Install dependencies and run review
          python3 -m pip install -r "$ACTION_DIR/requirements.txt"
          PYTHONPATH="$ACTION_DIR/src" python3 -m ai_pr_review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          INPUT_PROVIDER: ${{ inputs.provider }}
          INPUT_MODEL: ${{ inputs.model }}
          INPUT_BASE_URL: ${{ inputs.base_url }}
          INPUT_API_KEY: ${{ secrets.api_key }}
          INPUT_CONFIG_PATH: ${{ inputs.config_path }}
          INPUT_MAX_FILES: ${{ inputs.max_files }}
          INPUT_MAX_PATCH_CHARS: ${{ inputs.max_patch_chars }}
          INPUT_POST_SUMMARY: ${{ inputs.post_summary }}
          INPUT_MIN_SEVERITY_TO_PUBLISH: ${{ inputs.min_severity_to_publish }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
          DEEPSEEK_CODER_MODEL: ${{ vars.DEEPSEEK_CODER_MODEL }}
          BCP_API_KEY: ${{ secrets.BCP_API_KEY }}
          BCP_BASE_URL: ${{ vars.BCP_BASE_URL }}
          BCP_CODER_MODEL: ${{ vars.BCP_CODER_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_CODER_MODEL: ${{ vars.OPENAI_CODER_MODEL }}
